<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Immersive Dark-Themed Game Studio">
    <title>CrownForge Games</title>
    
    <!-- Tailwind CSS (CDN for rapid prototyping/production without build step) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#000000',
                            accent: '#facc15',
                            muted: '#9ca3af',
                            card: '#0a0a0a',
                            neon: '#f472b6'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="site-bg text-slate-200 antialiased min-h-screen flex flex-col">

    <!-- Header / Navigation -->
    <header class="fixed w-full top-0 z-50 bg-brand-dark/90 backdrop-blur-sm border-b border-slate-800">
        <div class="w-full px-6 md:px-10 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3">
                <img src="assets/images/logos/CFS_Black_logo.png" alt="CrownForge" class="h-12 w-auto">
                <span class="text-xl font-black tracking-tight">
                    <span class="text-brand-accent">CROWN</span><span class="text-white">FORGE</span>
                </span>
            </a>
            <nav class="hidden md:flex space-x-8">
                <a href="pages/games.html" class="hover:text-brand-accent transition-colors">Games</a>
                <a href="pages/about.html" class="hover:text-brand-accent transition-colors">Studio</a>
                <a href="pages/news-updates.html" class="hover:text-brand-accent transition-colors">News</a>
                <a href="pages/careers.html" class="hover:text-brand-accent transition-colors">Careers</a>
                <a href="pages/contact-support.html" class="hover:text-brand-accent transition-colors">Contact</a>
            </nav>
            <button class="md:hidden text-white focus:outline-none">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow pt-20">
        <!-- Hero Section -->
        <section class="relative h-[80vh] flex items-center justify-center overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-b from-transparent to-brand-dark z-10"></div>
            <!-- Placeholder for Hero Video/Image -->
            <div class="absolute inset-0 bg-slate-900 opacity-50 z-0"></div>
            
            <div class="container mx-auto px-6 relative z-20 text-center">
                <h1 class="text-5xl md:text-7xl font-extrabold mb-6 bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400">
                    FORGING WORLDS
                </h1>
                <p class="text-xl md:text-2xl text-brand-muted mb-10 max-w-2xl mx-auto">
                    Next-generation immersive gaming experiences built for the brave.
                </p>
                <a href="pages/games.html" class="px-8 py-3 bg-brand-accent text-brand-dark font-bold rounded-full hover:bg-white transition-all transform hover:scale-105">
                    Explore Games
                </a>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-black border-t border-slate-800 py-12">
        <div class="container mx-auto px-6 text-center text-brand-muted">
            <p class="mb-4">&copy; 2026 CrownForge Games. All rights reserved.</p>
            <div class="flex items-center justify-center gap-6 text-sm">
                <a href="pages/Privacy-Policy.html" class="hover:text-white">Privacy Policy</a>
                <a href="pages/TermsofService.html" class="hover:text-white">Terms of Service</a>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script type="module" src="assets/js/main.js"></script>
</body>
</html>
