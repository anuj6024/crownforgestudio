<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Add News - Admin | CrownForge Games</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#050505',
                            accent: '#facc15',
                            muted: '#9ca3af',
                            card: '#171717',
                            neon: '#ef4444'
                        }
                    },
                    fontFamily: { sans: ['Inter','sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="site-bg text-slate-200 antialiased min-h-screen flex flex-col">
    <header class="fixed w-full top-0 z-50 bg-brand-dark/90 backdrop-blur-sm border-b border-slate-800">
        <div class="w-full px-6 md:px-10 py-4 flex justify-between items-center">
            <a href="../index.html" class="flex items-center gap-3">
                <img src="../assets/images/logos/CFS_Black_logo.png" alt="CrownForge" class="h-10 w-auto">
                <span class="text-lg md:text-xl font-black tracking-tight"><span class="text-brand-accent">CROWN</span><span class="text-white">FORGE</span></span>
            </a>
            <div class="flex items-center gap-3">
                <span id="cf-user-email" class="text-xs text-slate-400"></span>
                <button id="cf-signout" class="px-3 py-1 rounded bg-white/5 border border-white/10 text-slate-300 hover:bg-white/10 text-xs">Sign out</button>
            </div>
        </div>
    </header>
    <main class="flex-grow pt-24 pb-16">
        <section class="container mx-auto px-6 max-w-6xl">
            <div class="mb-4">
                <a href="admin.html" class="text-brand-accent hover:text-white text-sm flex items-center gap-1 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    Back to Dashboard
                </a>
            </div>
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
                <!-- Left Column: Form -->
                <div class="bg-brand-card border border-slate-800 rounded-2xl p-6 shadow-xl">
                    <h1 class="text-2xl font-bold text-white mb-2">Add News</h1>
                    <p class="text-brand-muted mb-6 text-sm">Create a news or update item for the site.</p>
                    <form id="cf-news-form" class="space-y-4">
                        <div>
                            <label class="block text-sm text-slate-400 mb-2">Title</label>
                            <input id="cf-title" type="text" required class="w-full px-4 py-3 rounded bg-white/5 border border-white/10 focus:outline-none focus:border-brand-accent text-white placeholder-slate-500" placeholder="Headline">
                        </div>
                        <div>
                            <label class="block text-sm text-slate-400 mb-2">Category</label>
                            <select id="cf-category" required class="w-full px-4 py-3 rounded bg-white/5 border border-white/10 focus:outline-none focus:border-brand-accent text-white">
                                <option value="">Select category</option>
                                <option value="Update">Update</option>
                                <option value="Event">Event</option>
                                <option value="Dev Diary">Dev Diary</option>
                                <option value="Careers">Careers</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm text-slate-400 mb-2">Description</label>
                            <textarea id="cf-description" rows="6" required class="w-full px-4 py-3 rounded bg-white/5 border border-white/10 focus:outline-none focus:border-brand-accent text-white placeholder-slate-500" placeholder="Details"></textarea>
                        </div>
                        <div id="cf-success" class="hidden rounded border border-emerald-500/40 bg-emerald-500/10 text-emerald-300 text-sm px-3 py-2">Saved.</div>
                        <div id="cf-error" class="hidden rounded border border-red-500/40 bg-red-500/10 text-red-300 text-sm px-3 py-2"></div>
                        <button id="cf-submit" type="submit" class="w-full px-4 py-3 rounded bg-brand-accent text-brand-dark font-bold hover:bg-white transition-colors flex items-center justify-center gap-2">
                            <span>Save</span>
                            <svg id="cf-loading" class="hidden w-5 h-5 animate-spin text-brand-dark" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-opacity="0.3" stroke-width="4"></circle><path d="M22 12a10 10 0 00-10-10" stroke="currentColor" stroke-width="4"></path></svg>
                        </button>
                    </form>
                </div>

                <!-- Right Column: Live Preview -->
                <div class="lg:sticky lg:top-28 space-y-4">
                    <h2 class="text-lg font-bold text-slate-400 uppercase tracking-wider text-sm">Live Preview</h2>
                    <div id="cf-preview-container" class="opacity-100 transition-opacity">
                        <!-- Preview content injected here -->
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer class="bg-black border-t border-slate-800 py-10">
        <div class="container mx-auto px-6 text-center text-brand-muted text-sm">
            <p>&copy; 2026 CrownForge Games.</p>
        </div>
    </footer>
    <script type="module" src="../assets/js/admin.js"></script>
</body>
</html>
