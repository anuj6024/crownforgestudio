<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for Role - CrownForge Games</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#050505',
                            accent: '#facc15',
                            muted: '#9ca3af',
                            card: '#171717',
                            neon: '#ef4444'
                        }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="site-bg text-slate-200 antialiased min-h-screen flex flex-col">

    <header class="fixed w-full top-0 z-50 bg-brand-dark/90 backdrop-blur-sm border-b border-slate-800">
        <div class="w-full px-6 md:px-10 py-4 flex justify-between items-center">
            <a href="../index.html" class="flex items-center gap-3">
                <img src="../assets/images/logos/CFS_Black_logo.png" alt="CrownForge" class="h-10 w-auto">
                <span class="text-xl font-black tracking-tight">
                    <span class="text-brand-accent">CROWN</span><span class="text-white">FORGE</span>
                </span>
            </a>
            <a href="careers.html" class="text-sm text-slate-400 hover:text-white transition-colors flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                Back to Careers
            </a>
        </div>
    </header>

    <main class="flex-grow pt-28 pb-16 px-6">
        <div class="container mx-auto max-w-2xl">
            <div class="mb-8 text-center">
                <h1 class="text-3xl font-bold text-white mb-2">Apply for Position</h1>
                <p id="job-title-display" class="text-xl text-brand-accent">Loading role...</p>
            </div>

            <div class="bg-brand-card border border-slate-800 rounded-2xl p-8 shadow-xl">
                <form id="apply-form" class="space-y-6">
                    <input type="hidden" id="job-id">
                    <input type="hidden" id="job-title-hidden">

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm text-slate-400 mb-2">Full Name</label>
                            <input id="applicant-name" type="text" required class="w-full px-4 py-3 rounded bg-white/5 border border-white/10 focus:outline-none focus:border-brand-accent text-white placeholder-slate-500" placeholder="Enter your full name">
                        </div>
                        <div>
                            <label class="block text-sm text-slate-400 mb-2">Email Address</label>
                            <input id="applicant-email" type="email" required class="w-full px-4 py-3 rounded bg-white/5 border border-white/10 focus:outline-none focus:border-brand-accent text-white placeholder-slate-500" placeholder="Enter your email address">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm text-slate-400 mb-2">Portfolio / LinkedIn URL</label>
                        <input id="portfolio-url" type="url" required class="w-full px-4 py-3 rounded bg-white/5 border border-white/10 focus:outline-none focus:border-brand-accent text-white placeholder-slate-500" placeholder="Enter your portfolio or LinkedIn URL">
                    </div>

                    <div>
                        <label class="block text-sm text-slate-400 mb-2">Cover Letter / Message</label>
                        <textarea id="cover-letter" rows="5" required class="w-full px-4 py-3 rounded bg-white/5 border border-white/10 focus:outline-none focus:border-brand-accent text-white placeholder-slate-500" placeholder="Tell us why you're a great fit for this role..."></textarea>
                    </div>

                    <div id="form-message" class="hidden rounded p-4 text-sm text-center"></div>

                    <button id="submit-btn" type="submit" class="w-full px-6 py-4 rounded bg-brand-accent text-brand-dark font-bold hover:bg-white transition-colors flex items-center justify-center gap-2 text-lg">
                        <span>Submit Application</span>
                        <svg id="loading-spinner" class="hidden w-5 h-5 animate-spin text-brand-dark" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-opacity="0.3" stroke-width="4"></circle><path d="M22 12a10 10 0 00-10-10" stroke="currentColor" stroke-width="4"></path></svg>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <footer class="bg-black border-t border-slate-800 py-10">
        <div class="container mx-auto px-6 text-center text-brand-muted text-sm">
            <p>&copy; 2026 CrownForge Games. All rights reserved.</p>
        </div>
    </footer>

    <script type="module" src="../assets/js/apply.js"></script>
</body>
</html>
