<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Login - CrownForge Games</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#050505',
                            accent: '#facc15',
                            muted: '#9ca3af',
                            card: '#171717',
                            neon: '#ef4444'
                        }
                    },
                    fontFamily: { sans: ['Inter','sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="site-bg text-slate-200 antialiased min-h-screen flex flex-col">
    <header class="fixed w-full top-0 z-50 bg-brand-dark/90 backdrop-blur-sm border-b border-slate-800">
        <div class="w-full px-6 md:px-10 py-4 flex justify-between items-center">
            <a href="../index.html" class="flex items-center gap-3">
                <img src="../assets/images/logos/CFS_Black_logo.png" alt="CrownForge" class="h-10 w-auto">
                <span class="text-lg md:text-xl font-black tracking-tight"><span class="text-brand-accent">CROWN</span><span class="text-white">FORGE</span></span>
            </a>
        </div>
    </header>
    <main class="flex-grow pt-24 pb-16">
        <section class="container mx-auto px-6 max-w-md">
            <div class="bg-brand-card border border-slate-800 rounded-2xl p-6 shadow-xl">
                <h1 class="text-2xl font-bold text-white mb-2">Admin Login</h1>
                <p class="text-brand-muted mb-6 text-sm">Access the studio admin panel.</p>
                <form id="cf-login-form" class="space-y-4">
                    <div>
                        <label class="block text-sm text-slate-400 mb-2">Email</label>
                        <input id="cf-email" type="email" required class="w-full px-4 py-3 rounded bg-white/5 border border-white/10 focus:outline-none focus:border-brand-accent text-white placeholder-slate-500" placeholder="Enter your email here">
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-2">Password</label>
                        <input id="cf-password" type="password" required class="w-full px-4 py-3 rounded bg-white/5 border border-white/10 focus:outline-none focus:border-brand-accent text-white placeholder-slate-500" placeholder="Your password">
                    </div>
                    <div id="cf-error" class="hidden rounded border border-red-500/40 bg-red-500/10 text-red-300 text-sm px-3 py-2"></div>
                    <button id="cf-submit" type="submit" class="w-full px-4 py-3 rounded bg-brand-accent text-brand-dark font-bold hover:bg-white transition-colors flex items-center justify-center gap-2">
                        <span>Login</span>
                        <svg id="cf-loading" class="hidden w-5 h-5 animate-spin text-brand-dark" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-opacity="0.3" stroke-width="4"></circle><path d="M22 12a10 10 0 00-10-10" stroke="currentColor" stroke-width="4"></path></svg>
                    </button>
                </form>
                <p class="mt-4 text-xs text-slate-500">Use authorized studio credentials.</p>
            </div>
        </section>
    </main>
    <footer class="bg-black border-t border-slate-800 py-10">
        <div class="container mx-auto px-6 text-center text-brand-muted text-sm">
            <p>&copy; 2026 CrownForge Games.</p>
        </div>
    </footer>
    <script type="module" src="../assets/js/auth.js"></script>
</body>
</html>
