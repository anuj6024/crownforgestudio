<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Applications - Admin | CrownForge Games</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#050505',
                            accent: '#facc15',
                            muted: '#9ca3af',
                            card: '#171717',
                            neon: '#ef4444'
                        }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="site-bg text-slate-200 antialiased min-h-screen flex flex-col">

    <header class="fixed w-full top-0 z-50 bg-brand-dark/90 backdrop-blur-sm border-b border-slate-800">
        <div class="w-full px-6 md:px-10 py-4 flex justify-between items-center">
            <a href="../index.html" class="flex items-center gap-3">
                <img src="../assets/images/logos/CFS_Black_logo.png" alt="CrownForge" class="h-10 w-auto">
                <span class="text-lg md:text-xl font-black tracking-tight"><span class="text-brand-accent">CROWN</span><span class="text-white">FORGE</span></span>
            </a>
            <div class="flex items-center gap-3">
                <span id="cf-user-email" class="text-xs text-slate-400"></span>
                <button id="cf-signout" class="px-3 py-1 rounded bg-white/5 border border-white/10 text-slate-300 hover:bg-white/10 text-xs">Sign out</button>
            </div>
        </div>
    </header>

    <main class="flex-grow pt-24 pb-16">
        <section class="container mx-auto px-6 max-w-7xl">
            <div class="mb-6 flex items-center justify-between">
                <div>
                    <a href="admin.html" class="text-brand-accent hover:text-white text-sm flex items-center gap-1 transition-colors mb-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                        Back to Dashboard
                    </a>
                    <h1 class="text-3xl font-bold text-white">Job Applications</h1>
                    <p class="text-brand-muted text-sm mt-1">Review and manage incoming candidate applications.</p>
                </div>
                <div class="flex gap-2">
                    <button id="refresh-btn" class="p-2 rounded bg-white/5 border border-white/10 hover:bg-white/10 transition-colors" title="Refresh">
                        <svg class="w-5 h-5 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    </button>
                </div>
            </div>

            <!-- Applications Table -->
            <div class="bg-brand-card border border-slate-800 rounded-xl overflow-hidden shadow-xl">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-black/40 border-b border-slate-800 text-xs uppercase text-slate-400 font-semibold tracking-wider">
                                <th class="p-4">Candidate</th>
                                <th class="p-4">Role Applied For</th>
                                <th class="p-4">Applied Date</th>
                                <th class="p-4">Status</th>
                                <th class="p-4 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="applications-list" class="divide-y divide-slate-800/50">
                            <!-- Rows injected here -->
                            <tr>
                                <td colspan="5" class="p-8 text-center text-slate-500">Loading applications...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <!-- Application Detail Modal -->
    <div id="app-modal" class="fixed inset-0 z-[100] hidden bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-brand-card border border-slate-700 rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto shadow-2xl relative animate-in fade-in zoom-in duration-200">
            <button id="close-modal" class="absolute top-4 right-4 p-2 text-slate-400 hover:text-white transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            
            <div class="p-8">
                <div class="border-b border-slate-800 pb-6 mb-6">
                    <h2 id="modal-name" class="text-2xl font-bold text-white">Candidate Name</h2>
                    <p id="modal-role" class="text-brand-accent mt-1">Role Title</p>
                    <div class="flex items-center gap-4 mt-4 text-sm text-slate-400">
                        <span id="modal-email" class="flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                            email@example.com
                        </span>
                        <span id="modal-date">Oct 24, 2023</span>
                    </div>
                </div>

                <div class="space-y-6">
                    <div>
                        <h3 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-2">Portfolio</h3>
                        <a id="modal-portfolio" href="#" target="_blank" class="text-brand-accent hover:underline break-all">https://portfolio.com</a>
                    </div>
                    
                    <div>
                        <h3 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-2">Cover Letter</h3>
                        <div id="modal-message" class="bg-black/20 rounded-lg p-4 text-slate-300 whitespace-pre-wrap text-sm leading-relaxed border border-white/5"></div>
                    </div>

                    <div>
                         <h3 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-2">Status</h3>
                         <select id="modal-status" class="bg-black/20 border border-white/10 rounded px-3 py-2 text-slate-200 text-sm focus:border-brand-accent outline-none">
                             <option value="pending">Pending</option>
                             <option value="reviewed">Reviewed</option>
                             <option value="interviewing">Interviewing</option>
                             <option value="rejected">Rejected</option>
                             <option value="hired">Hired</option>
                         </select>
                         <button id="save-status-btn" class="ml-2 px-3 py-2 bg-brand-accent text-brand-dark font-bold rounded text-xs hover:bg-white transition-colors">Update</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="../assets/js/admin-applications.js"></script>
</body>
</html>
